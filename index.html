<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Clone</title>

    <!-- Bootstrap CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="main-container">
        
        <!-- Left Section -->
        <div class="container-l">
            <!-- Twitter Logo SVG -->
            <svg viewBox="0 0 24 24" class="main-logo">
                <path fill="#ffffff"
                    d="M23.643 4.937c-.835.37-1.732.62-2.675.733..."></path>
            </svg>
         
        </div>

        <!-- Right Section -->
        <div class="container-r">
            <div class="content-box">

                <svg viewBox="0 0 24 24" class="small-logo">
                    <path fill="#ffffff"
                        d="M23.643 4.937c-.835.37-1.732.62-2.675.733..."></path>
                </svg>

                <h1 class="main-title">Happening now</h1>
                <h2 class="sub-title">Join Twitter today.</h2>

                <button class="btn btn-light custom-btn">
                    Sign up with Google
                </button>

                <button class="btn btn-light custom-btn">
                    Sign up with Apple
                </button>

                <div class="divider">
                    <div></div>
                    <span>or</span>
                    <div></div>
                </div>

                <button class="btn btn-primary custom-btn primary-btn">
                    Sign up with phone or email
                </button>

                <div class="terms">
                    By signing up, you agree to the
                    <a href="#">Terms of Service</a> and
                    <a href="#">Privacy Policy</a>.
                </div>

                <div class="already">Already have an account?</div>

                <button class="btn btn-outline-light sign-in-btn">
                    Sign in
                </button>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="#">About</a>
        <a href="#">Help Center</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <a href="#">© 2022 Twitter, Inc.</a>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
